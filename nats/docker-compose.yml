services:
  nats:
    image: nats
    container_name: nats-server
    ports:
      - "4222:4222"   # Client connections
      - "8222:8222"   # HTTP monitoring
      - "6222:6222"   # Cluster port (unused in single-node)
    command:
      - "-js"        # Enable JetStream
      - "-m"         # Monitoring port
      - "8222"
    volumes:
      - nats-data:/data
    restart: unless-stopped

volumes:
  nats-data:
